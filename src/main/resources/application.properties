spring.application.name=credit_product

spring.datasource.url=jdbc:postgresql://localhost:5432/credit_db
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.dynamic-rules.datasource.url=jdbc:postgresql://localhost:5432/dynamic_credit_db
spring.dynamic-rules.datasource.username=postgres
spring.dynamic-rules.datasource.password=123
spring.dynamic-rules.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=1h

application.recommendations-db.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

spring.sql.init.mode=never

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.show-actuator=true
springdoc.cache.disabled=true

app.name=Credit Product Recommendation System
app.version=1.0.1
